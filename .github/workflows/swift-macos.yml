name: Swift macOS

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    name: Build and Test
    runs-on: macos-latest
    steps:
      - name: Check out Swift port
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build package
        run: swift build

      - name: Run tests
        run: swift test

      - name: Check diff hygiene
        run: git diff --check
